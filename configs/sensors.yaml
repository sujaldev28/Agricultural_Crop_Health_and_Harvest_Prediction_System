# Sensor configurations and validation ranges
sensors:
  temperature:
    unit: "Celsius"
    min_value: -10.0
    max_value: 60.0
    drift_tolerance: 0.5
    anomaly_z_score_threshold: 3.0
  humidity:
    unit: "Percent"
    min_value: 0.0
    max_value: 100.0
    drift_tolerance: 2.0
    anomaly_z_score_threshold: 2.5
  air_quality:
    unit: "ppm"
    min_value: 300.0
    max_value: 5000.0
    drift_tolerance: 50.0
    anomaly_z_score_threshold: 3.5
  light_intensity:
    unit: "Lux"
    min_value: 0.0
    max_value: 100000.0
    drift_tolerance: 100.0
    anomaly_z_score_threshold: 3.0
  soil_moisture:
    unit: "Percent"
    min_value: 0.0
    max_value: 100.0
    drift_tolerance: 1.5
    anomaly_z_score_threshold: 2.5
  soil_ph:
    unit: "pH"
    min_value: 3.0
    max_value: 10.0
    drift_tolerance: 0.2
    anomaly_z_score_threshold: 3.0
  electrical_conductivity:
    unit: "dS/m"
    min_value: 0.0
    max_value: 10.0
    drift_tolerance: 0.1
    anomaly_z_score_threshold: 3.0
